<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web en Construcción - Sistema Activo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            color: #00ff41;
        }

        /* Capa 1: Lluvia Matrix */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Capa 2: Filtro de monitor CRT (Scanlines y Viñeta) */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        /* Capa 3: Contenedor 3D */
        .scene3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            perspective: 800px;
        }

        /* Objeto flotante y rotatorio */
        .hologram-container {
            position: relative;
            transform-style: preserve-3d;
            animation: floatAndRotate 12s ease-in-out infinite alternate;
        }

        /* Texto 3D con efecto Glitch */
        .text-glitch {
            position: relative;
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 5px;
            text-shadow: 
                0 0 10px #00ff41,
                0 0 20px #00ff41,
                -3px 0px 5px rgba(255,0,0,0.7),
                3px 0px 5px rgba(0,0,255,0.7);
            animation: pulseNeon 2s infinite;
        }

        /* Pseudo-elementos para el Glitch */
        .text-glitch::before, .text-glitch::after {
            content: "WEB EN CONSTRUCCIÓN";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
        }

        .text-glitch::before {
            left: 3px;
            text-shadow: -2px 0 red;
            animation: glitch-anim-1 3s infinite linear alternate-reverse;
        }

        .text-glitch::after {
            left: -3px;
            text-shadow: -2px 0 blue;
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        /* Capa 4: Terminal de consola inferior */
        .terminal {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 4;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00ff41;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
            margin-left: 5px;
        }

        /* Animaciones */
        @keyframes floatAndRotate {
            0% { transform: rotateY(-20deg) rotateX(10deg) translateY(0px); }
            50% { transform: rotateY(20deg) rotateX(-5deg) translateY(-20px); }
            100% { transform: rotateY(-20deg) rotateX(10deg) translateY(0px); }
        }

        @keyframes pulseNeon {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41, -3px 0px 5px rgba(255,0,0,0.7), 3px 0px 5px rgba(0,0,255,0.7); }
            50% { opacity: 0.8; text-shadow: 0 0 5px #00ff41, 0 0 10px #00ff41, -1px 0px 3px rgba(255,0,0,0.5), 1px 0px 3px rgba(0,0,255,0.5); }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 50% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        @media (max-width: 768px) {
            .text-glitch { font-size: 2.5rem; }
            .terminal { font-size: 0.9rem; left: 15px; bottom: 15px; }
        }
    </style>
</head>
<body>

    <!-- Filtro Monitor Antiguo -->
    <div class="crt-overlay"></div>

    <!-- Fondo de lluvia Matrix mejorado -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Holograma 3D con Glitch -->
    <div class="scene3d">
        <div class="hologram-container">
            <h1 class="text-glitch" data-text="WEB EN CONSTRUCCIÓN">WEB EN CONSTRUCCIÓN</h1>
        </div>
    </div>

    <!-- Terminal de comandos -->
    <div class="terminal">
        <span id="typewriter"></span><span class="cursor"></span>
    </div>

    <script>
        // --- 1. EFECTO MATRIX AVANZADO ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789<>-_=+*[]{}";
        const fontSize = 18;
        let columns = Math.floor(canvas.width / fontSize);
        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = Math.random() * -100;
        }

        function drawMatrix() {
            // Fondo con opacidad para el rastro
            ctx.fillStyle = 'rgba(5, 5, 5, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px "Share Tech Mono"';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
                const x = i * fontSize;
                const y = rainDrops[i] * fontSize;

                // Cabecera brillante (blanca) y cola verde
                if (Math.random() > 0.8) {
                    ctx.fillStyle = '#ffffff'; // Destello blanco aleatorio
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffffff';
                } else {
                    ctx.fillStyle = '#00ff41'; // Verde matriz
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#00ff41';
                }

                ctx.fillText(text, x, y);
                ctx.shadowBlur = 0; // Resetear sombra para no sobrecargar el rendimiento

                if (y > canvas.height && Math.random() > 0.95) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
            requestAnimationFrame(drawMatrix); // Uso de requestAnimationFrame para mayor fluidez
        }
        drawMatrix();

        // --- 2. EFECTO MÁQUINA DE ESCRIBIR (TERMINAL) ---
        const texts = [
            "> Iniciando secuencias de servidor...",
            "> Estableciendo conexión segura...",
            "> Cargando módulos de interfaz...",
            "> Estado del proyecto: EN DESARROLLO.",
            "> Por favor, regrese más tarde_"
        ];
        
        let textIndex = 0;
        let charIndex = 0;
        const typewriterElement = document.getElementById('typewriter');

        function typeWriter() {
            if (textIndex < texts.length) {
                if (charIndex < texts[textIndex].length) {
                    typewriterElement.innerHTML += texts[textIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, Math.random() * 50 + 30); // Velocidad de tipeo variable
                } else {
                    setTimeout(eraseText, 2000); // Esperar antes de borrar
                }
            } else {
                textIndex = 0; // Bucle infinito
                setTimeout(typeWriter, 500);
            }
        }

        function eraseText() {
            if (charIndex > 0) {
                let currentText = texts[textIndex].substring(0, charIndex - 1);
                typewriterElement.innerHTML = currentText;
                charIndex--;
                setTimeout(eraseText, 20); // Velocidad de borrado rápida
            } else {
                textIndex++;
                setTimeout(typeWriter, 500);
            }
        }

        // Iniciar la terminal con un pequeño retraso
        setTimeout(typeWriter, 1000);
    </script>
</body>
</html>
