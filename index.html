<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cockpit Financiero - Auditoría</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --text: #e0e0e0;
            --border: #333;
            --accent: #00e5ff;
            --peligro: #ff3366;
            --fragil: #ff9933;
            --sano: #00cc66;
            --solido: #b366ff;
        }
        
        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            font-size: 14px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent);
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .context-info {
            color: #888;
            font-size: 0.85rem;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: var(--panel);
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .input-group { display: flex; flex-direction: column; }
        
        .input-group label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }
        
        .input-group input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 20px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        .dashboard {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .metric-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 15px;
            border-left: 4px solid var(--border);
        }

        .metric-title {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .metric-status {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        .directivas {
            margin-top: 30px;
            background: #111;
            border: 1px solid var(--peligro);
            padding: 20px;
            display: none;
        }

        .directivas h3 {
            color: var(--peligro);
            margin-top: 0;
            text-transform: uppercase;
        }

        .directivas ul { margin: 0; padding-left: 20px; }
        .directivas li { margin-bottom: 10px; line-height: 1.4; }

        /* Status Colors */
        .status-peligro { color: var(--peligro); background: rgba(255,51,102,0.1); }
        .status-fragil { color: var(--fragil); background: rgba(255,153,51,0.1); }
        .status-sano { color: var(--sano); background: rgba(0,204,102,0.1); }
        .status-solido { color: var(--solido); background: rgba(179,102,255,0.1); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Auditoría Financiera - Nico Bongiorno</h1>
        <div class="context-info">
            Sistema inicializado. Monitoreo estricto del ecosistema operativo familiar (Nathalia, Isabella, Renata). <br>
            Base: Villa Parque Santa Ana | Nodos activos: Horas clínicas, IOL, MP, Centro Teseo.
        </div>
    </div>

    <div class="grid-inputs">
        <div class="input-group">
            <label>Ingreso Total del Mes (ARS)</label>
            <input type="number" id="ingresoTotal" placeholder="Ej: 4500000">
        </div>
        <div class="input-group">
            <label>Ingreso Mes Anterior (ARS)</label>
            <input type="number" id="ingresoAnterior" placeholder="Ej: 4000000">
        </div>
        <div class="input-group">
            <label>Ingreso Horas Clínicas (ARS)</label>
            <input type="number" id="ingresoPrincipal" placeholder="Ej: 3000000">
        </div>
        <div class="input-group">
            <label>Gastos Totales del Mes (ARS)</label>
            <input type="number" id="gastoTotal" placeholder="Ej: 2800000">
        </div>
        <div class="input-group">
            <label>Liquidez Inmediata MP (ARS)</label>
            <input type="number" id="liquidez" placeholder="Ej: 800000">
        </div>
        <div class="input-group">
            <label>Capital en IOL / Ahorros (ARS)</label>
            <input type="number" id="iol" placeholder="Ej: 5000000">
        </div>
        <div class="input-group">
            <label>Aportes a Inversión este mes (ARS)</label>
            <input type="number" id="inversionMes" placeholder="Ej: 400000">
        </div>
        <div class="input-group">
            <label>Deudas Totales (ARS)</label>
            <input type="number" id="deudas" value="0">
        </div>
        <div class="input-group">
            <label>VPN Mes Anterior (ARS)</label>
            <input type="number" id="vpnAnterior" placeholder="Opcional">
        </div>
    </div>

    <button onclick="ejecutarAuditoria()">Ejecutar Auditoría</button>

    <div class="dashboard" id="dashboard">
        <!-- Tarjetas de métricas generadas por JS -->
    </div>

    <div class="directivas" id="directivas">
        <h3>Directivas de Corrección Inmediata</h3>
        <ul id="listaDirectivas"></ul>
    </div>
</div>

<script>
    function formatearARS(numero) {
        return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(numero);
    }

    function asignarEstado(valor, umbrales, etiquetas, clases) {
        for (let i = 0; i < umbrales.length; i++) {
            if (valor < umbrales[i]) return { txt: etiquetas[i], cls: clases[i], score: i };
        }
        return { txt: etiquetas[etiquetas.length-1], cls: clases[clases.length-1], score: clases.length-1 };
    }

    function crearTarjeta(titulo, valor, estadoObj) {
        return `
            <div class="metric-card" style="border-left-color: var(--${estadoObj.cls.replace('status-','')})">
                <div class="metric-title">${titulo}</div>
                <div class="metric-value">${valor}</div>
                <div class="metric-status ${estadoObj.cls}">${estadoObj.txt}</div>
            </div>
        `;
    }

    function ejecutarAuditoria() {
        const ingresos = parseFloat(document.getElementById('ingresoTotal').value) || 0;
        const ingAnterior = parseFloat(document.getElementById('ingresoAnterior').value) || 1; 
        const ingPrincipal = parseFloat(document.getElementById('ingresoPrincipal').value) || 0;
        const gastos = parseFloat(document.getElementById('gastoTotal').value) || 1;
        const liquidez = parseFloat(document.getElementById('liquidez').value) || 0;
        const iol = parseFloat(document.getElementById('iol').value) || 0;
        const inversion = parseFloat(document.getElementById('inversionMes').value) || 0;
        const deudas = parseFloat(document.getElementById('deudas').value) || 0;
        const vpnAnterior = parseFloat(document.getElementById('vpnAnterior').value) || 0;

        const gastoDiario = gastos / 30;

        // 1. Liquidez (Días)
        const diasLiquidez = liquidez / gastoDiario;
        const estLiq = asignarEstado(diasLiquidez, [7, 30, 90], 
            ['PELIGRO (<7)', 'FRÁGIL (7-30)', 'SANO (30-90)', 'SÓLIDO (90+)'], 
            ['status-peligro', 'status-fragil', 'status-sano', 'status-solido']);

        // 2. Fondo Emergencia (Meses)
        const mesesFondo = iol / gastos;
        const estFondo = asignarEstado(mesesFondo, [1, 3, 6], 
            ['CRÍTICO (0-1)', 'FRÁGIL (1-3)', 'BUENO (3-6)', 'EXCELENTE (6-12)'], 
            ['status-peligro', 'status-fragil', 'status-sano', 'status-solido']);

        // 3. Ratio Ahorro (%)
        const ratioAhorro = ((ingresos - gastos) / ingresos) * 100;
        const estAhorro = asignarEstado(ratioAhorro, [10, 20, 40], 
            ['POBRE (<10%)', 'ACEPTABLE (10-20%)', 'FUERTE (20-40%)', 'ACELERACIÓN (40%+)'], 
            ['status-peligro', 'status-fragil', 'status-sano', 'status-solido']);

        // 4. Dependencia Ingreso (%) - Lógica inversa (menor es mejor)
        const depIngreso = (ingPrincipal / ingresos) * 100;
        let estDep;
        if (depIngreso > 80) estDep = {txt: 'ALTO (>80%)', cls: 'status-peligro', score: 0};
        else if (depIngreso > 60) estDep = {txt: 'MEDIO (60-80%)', cls: 'status-fragil', score: 1};
        else if (depIngreso > 40) estDep = {txt: 'BUENO (40-60%)', cls: 'status-sano', score: 2};
        else estDep = {txt: 'SÓLIDO (<40%)', cls: 'status-solido', score: 3};

        // 5. Crecimiento Ingresos (%)
        const crecimiento = ((ingresos - ingAnterior) / ingAnterior) * 100;
        const estCrecimiento = asignarEstado(crecimiento, [0, 5, 15], 
            ['ALERTA (<0%)', 'ESTANCADO (0-5%)', 'SALUDABLE (5-15%)', 'EXPANSIÓN (15%+)'], 
            ['status-peligro', 'status-fragil', 'status-sano', 'status-solido']);

        // 6. Ratio Inversión/Consumo (%)
        const ratioInv = (inversion / ingresos) * 100;
        const estInv = asignarEstado(ratioInv, [5, 15, 30], 
            ['CONSUMO TOTAL (<5%)', 'BÁSICO (5-15%)', 'SÓLIDO (15-30%)', 'CONSTRUCTOR (30%+)'], 
            ['status-peligro', 'status-fragil', 'status-sano', 'status-solido']);

        // 7. VPN
        const vpnActual = (liquidez + iol) - deudas;
        const tendenciaVPN = vpnAnterior === 0 ? 'NEUTRAL' : (vpnActual >= vpnAnterior ? '⬆️ SUBE' : '⬇️ BAJA');
        const colorVPN = tendenciaVPN.includes('SUBE') ? 'status-sano' : (tendenciaVPN.includes('BAJA') ? 'status-peligro' : 'status-fragil');

        // Render Cards
        const dash = document.getElementById('dashboard');
        dash.innerHTML = `
            ${crearTarjeta('1. Liquidez Inmediata', diasLiquidez.toFixed(1) + ' Días', estLiq)}
            ${crearTarjeta('2. Fondo Emergencia', mesesFondo.toFixed(1) + ' Meses', estFondo)}
            ${crearTarjeta('3. Ratio de Ahorro', ratioAhorro.toFixed(1) + ' %', estAhorro)}
            ${crearTarjeta('4. Dependencia Ingreso', depIngreso.toFixed(1) + ' %', estDep)}
            ${crearTarjeta('5. Tasa Crecimiento', crecimiento.toFixed(1) + ' %', estCrecimiento)}
            ${crearTarjeta('6. Inversión / Consumo', ratioInv.toFixed(1) + ' %', estInv)}
            <div class="metric-card" style="border-left-color: var(--border)">
                <div class="metric-title">7. Valor Patrimonial Neto</div>
                <div class="metric-value">${formatearARS(vpnActual)}</div>
                <div class="metric-status ${colorVPN}">${tendenciaVPN}</div>
            </div>
        `;
        dash.style.display = 'grid';

        // Evaluar peor métrica para directivas
        const metricas = [
            { id: 1, name: 'Liquidez Inmediata', score: estLiq.score },
            { id: 2, name: 'Fondo de Emergencia', score: estFondo.score },
            { id: 3, name: 'Ratio de Ahorro', score: estAhorro.score },
            { id: 4, name: 'Dependencia de Ingreso', score: estDep.score },
            { id: 5, name: 'Crecimiento de Ingresos', score: estCrecimiento.score },
            { id: 6, name: 'Ratio Inversión/Consumo', score: estInv.score }
        ];

        metricas.sort((a, b) => a.score - b.score);
        const peorMetrica = metricas[0];

        const directivasArea = document.getElementById('directivas');
        const listaDir = document.getElementById('listaDirectivas');
        listaDir.innerHTML = '';

        let dir1 = '';
        let dir2 = '';

        switch(peorMetrica.id) {
            case 1:
                dir1 = "Frenar cualquier salida de capital hacia IOL o proyectos secundarios hasta garantizar un piso de 30 días de cobertura operativa en Mercado Pago.";
                dir2 = "Liquidar posiciones de corto plazo o renegociar fechas de pagos fijos para recomponer la barrera de liquidez esta misma semana.";
                break;
            case 2:
                dir1 = "El capital actual expone la estructura. Redirigir el 100% del excedente de este mes a activos conservadores en IOL; cero riesgo hasta cubrir 3 meses de piso.";
                dir2 = "Auditar y recortar gastos variables del mes en curso para inyectar liquidez directa al fondo de contingencia.";
                break;
            case 3:
                dir1 = "El motor de retención está fallando. Ejecutar un bloqueo automático del 20% de los ingresos internacionales ni bien ingresen, antes de cualquier gasto corriente.";
                dir2 = "Identificar y eliminar inmediatamente el 10% de los gastos no esenciales presupuestados para los próximos 30 días.";
                break;
            case 4:
                dir1 = "Riesgo de concentración crítico. Acelerar la captación de pacientes internacionales en Centro Teseo esta semana para diversificar la entrada de divisas.";
                dir2 = "Priorizar estructuralmente la comercialización de los servicios de psicología para crear una segunda columna fuerte de facturación.";
                break;
            case 5:
                dir1 = "Facturación estancada. Ajustar tarifas de horas clínicas locales según inflación o aumentar el volumen de horas operativas de forma inmediata.";
                dir2 = "Lanzar una campaña táctica de reactivación de pacientes o empaquetar servicios en Centro Teseo para generar un pico de caja a corto plazo.";
                break;
            case 6:
                dir1 = "Se está consumiendo el capital en lugar de construir patrimonio. Imponer una regla estricta: ninguna compra no vital hasta que el 15% del ingreso total haya sido invertido.";
                dir2 = "Auditar el flujo de Mercado Pago para detectar fugas de capital hormiga y redireccionarlas automáticamente a instrumentos de interés compuesto.";
                break;
        }

        listaDir.innerHTML = `<li><strong>Punto Crítico Detectado: ${peorMetrica.name}.</strong> ${dir1}</li><li>${dir2}</li>`;
        directivasArea.style.display = 'block';
    }
</script>

</body>
</html>
