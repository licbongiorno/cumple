<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web en Construcción - Nivel Máximo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #020202;
            font-family: 'Share Tech Mono', monospace;
            color: #00ff41;
            perspective: 1000px;
        }

        /* Pantalla de Inicio (Para desbloquear el Audio) */
        #boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.5s;
        }
        #boot-screen h2 { font-size: 2rem; animation: blink 1s infinite; text-shadow: 0 0 10px #00ff41; }
        
        /* Capa 1: Lluvia Matrix */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Capa 2: Filtro CRT y Flicker (Parpadeo) */
        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            animation: flicker 0.15s infinite;
        }

        /* Capa 3: Contenedor 3D y Parallax */
        .scene3d {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 3;
            transform-style: preserve-3d;
        }

        /* Holograma que reacciona al ratón */
        .hologram-container {
            position: relative; transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Suaviza el movimiento del ratón */
        }

        /* Texto 3D con efecto Glitch */
        .text-glitch {
            position: relative; font-size: 6vw; font-weight: bold; color: #fff;
            text-transform: uppercase; text-align: center; white-space: nowrap; letter-spacing: 5px;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41, -3px 0px 5px rgba(255,0,0,0.8), 3px 0px 5px rgba(0,0,255,0.8);
            animation: float 6s ease-in-out infinite alternate;
        }

        .text-glitch::before, .text-glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent;
        }
        .text-glitch::before { left: 4px; text-shadow: -3px 0 red; animation: glitch-anim-1 2s infinite linear alternate-reverse; }
        .text-glitch::after { left: -4px; text-shadow: 3px 0 blue; animation: glitch-anim-2 3s infinite linear alternate-reverse; }

        /* Capa 4: Terminal de consola inferior */
        .terminal { position: absolute; bottom: 30px; left: 30px; z-index: 4; font-size: 1.2rem; text-shadow: 0 0 5px #00ff41; }
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background-color: #00ff41; animation: blink 1s step-end infinite; vertical-align: bottom; margin-left: 5px; }

        /* Destello aleatorio (Relámpago de sistema) */
        .flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 255, 65, 0.2); z-index: 20; opacity: 0; pointer-events: none;
        }

        /* Animaciones */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes float { 0% { transform: translateY(-15px); } 100% { transform: translateY(15px); } }
        @keyframes flicker {
            0% { opacity: 0.95; } 50% { opacity: 0.85; } 100% { opacity: 0.95; }
        }
        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 50% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); } 60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); } 100% { clip-path: inset(5% 0 80% 0); }
        }
    </style>
</head>
<body>

    <div id="boot-screen" onclick="initSystem()">
        <h2>[ CLICK PARA INICIALIZAR SISTEMA ]</h2>
    </div>

    <div class="crt-overlay"></div>
    <div class="flash" id="flash-fx"></div>
    <canvas id="matrixCanvas"></canvas>

    <div class="scene3d" id="scene">
        <div class="hologram-container" id="hologram">
            <h1 class="text-glitch" data-text="WEB EN CONSTRUCCIÓN">WEB EN CONSTRUCCIÓN</h1>
        </div>
    </div>

    <div class="terminal">
        <span id="typewriter"></span><span class="cursor"></span>
    </div>

    <script>
        // --- MOTOR DE AUDIO SINTÉTICO (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Sonido 1: Zumbido de fondo continuo (Transformador eléctrico)
            const oscHum = audioCtx.createOscillator();
            const gainHum = audioCtx.createGain();
            oscHum.type = 'sawtooth';
            oscHum.frequency.value = 50; // Frecuencia muy baja
            gainHum.gain.value = 0.05;
            oscHum.connect(gainHum);
            gainHum.connect(audioCtx.destination);
            oscHum.start();

            // Modulador para que el zumbido pulse
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.5;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.02;
            lfo.connect(lfoGain);
            lfoGain.connect(gainHum.gain);
            lfo.start();
        }

        // Sonido 2: Pitido de escritura en terminal
        function playBeep() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 600 + Math.random() * 400; // Tono aleatorio robótico
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Sonido 3: Cortocircuito / Glitch aleatorio
        function playGlitchSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- INICIALIZAR SISTEMA AL HACER CLICK ---
        function initSystem() {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 500);
            initAudio();
            setTimeout(typeWriter, 1000);
            triggerRandomGlitch();
        }

        // --- EFECTO MATRIX AVANZADO ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        const rainDrops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                const x = i * fontSize;
                const y = rainDrops[i] * fontSize;

                // Color dinámico para columnas corruptas
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#fff';
                } else {
                    ctx.fillStyle = '#0f4';
                    ctx.shadowColor = '#0f4';
                }
                ctx.shadowBlur = 5;

                ctx.fillText(text, x, y);
                ctx.shadowBlur = 0;

                if (y > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }
        drawMatrix();

        // --- EFECTO MÁQUINA DE ESCRIBIR (TERMINAL) ---
        const texts = [
            "INICIANDO PROTOCOLOS DE SEGURIDAD...",
            "CARGANDO ENTORNO 3D [OK]",
            "SINTETIZANDO AUDIO [OK]",
            "SISTEMA EN FASE DE CONSTRUCCIÓN.",
            "ADVERTENCIA: INESTABILIDAD DETECTADA_"
        ];
        let textIdx = 0, charIdx = 0;
        const twElement = document.getElementById('typewriter');

        function typeWriter() {
            if (textIdx < texts.length) {
                if (charIdx < texts[textIdx].length) {
                    twElement.innerHTML += texts[textIdx].charAt(charIdx);
                    playBeep(); // Suena al escribir
                    charIdx++;
                    setTimeout(typeWriter, Math.random() * 40 + 20);
                } else {
                    setTimeout(eraseText, 2000);
                }
            } else {
                textIdx = 0; setTimeout(typeWriter, 500);
            }
        }

        function eraseText() {
            if (charIdx > 0) {
                twElement.innerHTML = texts[textIdx].substring(0, charIdx - 1);
                charIdx--;
                setTimeout(eraseText, 15);
            } else {
                textIdx++; setTimeout(typeWriter, 500);
            }
        }

        // --- PARALLAX 3D CON EL RATÓN ---
        const hologram = document.getElementById('hologram');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 20; // Sensibilidad X
            const yAxis = (window.innerHeight / 2 - e.pageY) / 20; // Sensibilidad Y
            hologram.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // --- DESTELLOS VISUALES ALEATORIOS ---
        function triggerRandomGlitch() {
            const flash = document.getElementById('flash-fx');
            setInterval(() => {
                if(Math.random() > 0.7) {
                    flash.style.opacity = '1';
                    playGlitchSound(); // Suena un fallo del sistema
                    setTimeout(() => flash.style.opacity = '0', 50);
                }
            }, 3000); // Intenta hacer un glitch cada 3 segundos
        }
    </script>
</body>
</html>
